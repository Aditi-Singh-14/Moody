<!DOCTYPE html>
<!--
This website is held together
by hope, duct tape, and CSS.
-->
<html>
    <head>
        <style>  /* This style section gives the website a glow-up */
        .section {
            position: fixed;
            inset: 0;
            z-index: -1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: visible;
            pointer-events: none;
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center
        }

        
        .swiper {
            width: 100%;
            max-width: 1100px;
            height: 380px;
            margin-top: 40px;
            margin-bottom: 20px;
        }
        .swiper-slide{
            width: 220px !important;
            height: 300px;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            padding: 15px;
            transition: transform 0.3s ease;
        }

        .swiper-slide:hover{
            transform: scale(1.05);
        }
        .swiper-slide img{
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 12px;
        }
        </style>
        <link rel="icon" href="/Images/Favicon2.png" type="image/png">  <!--favicon--> 
        <title>Moodify</title>
        <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script> <!-- this is the swiper js link for the song cards-->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> <!-- this is the css tailwind link..to use css directly in html-->
    </head>
    <body class="bg-black min-h-screen text-white overflow-x-hidden"> <!-- this is the main body of the page and the text is set white as default-->
        <div id="app" class="flex flex-col items-center justify-center min-h-screen relative z-10"><!-- this is the main container for the app -->
        <link rel="preconnect" href="https://fonts.googleapis.com"><!-- this is for the font link from google fonts -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" /> <!-- this is the swiper css link for the song cards-->
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Monoton&display=swap" rel="stylesheet"><!-- This font might change someday...just like people-->
        <h1 class="text-6xl tracking-widest mb-4 text-center" style="font-family: 'Monoton', cursive; background: linear-gradient(135deg, #fff 0%, #a78bfa 50%, #818cf8 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Moodify</h1>
        <hr>
        <p> Welcome to Moodify!</p>
        <p>Tell us what mood you're in today:</p>
        <input id="mood" onkeydown="if(event.key=='Enter')findMySong()" type="text" placeholder="So, what's the mood today?" class="bg-gray-800 text-white border border-white-400 rounded-lg p-3 w-72 text-center focus:outline-none focus:ring-2 focus:ring-lightpurple-400 mb-4">
        <button onclick="findMySong()" class="text-black text-sm bg-gradient-to-r from-white via-purple-300 to-indigo-400 px-4 py-2 rounded-lg hover:scale-105 hover:shadow-lg transition duration-300">Find my Song</button>
        <div id="loading" style='display:none'>
            <p> Finding your vibe....👀</p>
        </div>
        <div class="swiper">
            <div class="swiper-wrapper" id="cards"></div>
            <div class="swiper-pagination"></div>
            <div class="swiper-button-prev"></div>
            <div class="swiper-button-next"></div>
        </div><!--Songs will append in these cards-->
        </div>
        <section class="section" id="BG">
        </section>
        <footer style="position: fixed; bottom: 0; width: 100%; background:linear-gradient(#fff 0%, #a78bfa 50%, #818cf8 100%); color: rgb(0, 0, 0); text-align: center; font-size: 14px; z-index: 10;">
            &copy;2026 Moodify.<br> All rights reserved.<br>
                Made with ❤️. 
            </footer>
        <script>
            let currentAudio = null;
            let swiperInstance= null; // To keep track of the currently playing audio
            function playSong(previewUrl) {
                if (currentAudio){
                    currentAudio.pause(); // Pause the currently playing audio
                }
                const audio = new Audio(previewUrl);
                audio.play();//play new audio
                currentAudio = audio; // Update the current audio reference
                }
                    
            //javascript code will be here
            function findMySong(){
                const mood = document.getElementById('mood').value;
                if(currentAudio){
                    currentAudio.pause(); // Pause any currently playing audio when a new search is made
                    currentAudio = null; // Reset the current audio reference
                }
                if (mood === null || mood.trim() === '') {
                    alert("please enter a mood first!"); // Alert the user if the input is empty
                    return; // If the input is empty, do nothing
                }
                document.getElementById('loading').style.display = 'block'; // Show loading message while fetching recommendations
                fetch(`http://127.0.0.1:8000/recommend?mood=${mood}`, {
                    method: 'POST'
                })
                .then(response => response.json())
                .then(data => {
                    if (swiperInstance) {
                        swiperInstance.destroy(); // Destroy the previous Swiper instance if it exists to prevent conflicts
                        swiperInstance = null; // Reset the swiper instance reference
                    }
                    document.getElementById('cards').innerHTML = ''; // Clear previous recommendations
                    document.getElementById('loading').style.display = 'none'; // Hide loading message after fetching recommendations
                    const albumArts = [];
                    for (const song of data.recommendations) { // Loop through the recommended songs and create song cards
                        albumArts.push(song.album_art); // Store album art URLs in an array for later use (if needed) 
                        const songelement=document.createElement('div'); // Create a new div element for each song
                        songelement.setAttribute('onclick', `playSong('${song.preview_url}')`);
                        songelement.innerHTML = `
                        <img src="${song.album_art}">
                        <h3 style="font-size:20px; font-weight:bold; text-align:center;">
                            ${song.title}
                        </h3>
                        <p style="opacity:0.8; text-align:center;">   
                            ${song.artist} <!-- Display the artist name with a slightly faded style for better aesthetics -->
                        </p>
                        `; // Create a song card with album art, title, and artist
                        document.getElementById('cards').appendChild(songelement);
                        songelement.className='swiper-slide'; // Add swiper-slide class to each song element
                    }
                    swiperInstance = new Swiper('.swiper',{ // Initialize Swiper after adding songs 
                        slidesPerView: 3,
                        spaceBetween: 50,
                        centeredSlides: true,
                        
                        pagination: { // Add pagination for better navigation
                            el: '.swiper-pagination',
                            clickable: true,
                        },
                        navigation: {
                            nextEl: '.swiper-button-next',
                            prevEl: '.swiper-button-prev',
                        },
                        on: 
                        {
                            slideChange(swiper) { // Change background image based on the active slide's album art
                                document.getElementById('BG').style.backgroundImage = `url(${albumArts[swiper.activeIndex]})`;
                                document.getElementById('BG').style.filter = 'blur(5px)';
                            },
                            click(swiper) {
                                swiper.slideTo(swiper.clickedIndex); // Slide to the clicked song card for better user experience}
                            }
                        }
                    });
                    setTimeout(() => swiperInstance.update(), 100);
                    document.getElementById('BG').style.backgroundImage = `url(${albumArts[0]})`; // Set initial background image to the first song's album art
                    })
            }
        </script>

    </body>

</html>
